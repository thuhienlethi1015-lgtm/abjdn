<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nhân Sinh Mô Phỏng - Khịa Level Cao</title>

<style>
body{
  margin:0;
  font-family:"Times New Roman",serif;
  background:#0a0a0a;
  color:#eee;
}

.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

.title{
  text-align:center;
  font-size:28px;
  color:#d4af37;
  margin-bottom:20px;
  letter-spacing:3px;
}

.status{
  border:1px solid #d4af37;
  padding:10px;
  margin-bottom:15px;
  background:#111;
}

.story{
  border:1px solid #444;
  padding:15px;
  margin-bottom:15px;
  background:#111;
  line-height:1.7;
  min-height:140px;
}

.choices button{
  width:100%;
  margin:6px 0;
  padding:10px;
  background:#222;
  color:#fff;
  border:none;
  cursor:pointer;
  transition:.25s;
}

.choices button:hover{
  background:#d4af37;
  color:#000;
}

.log{
  margin-top:15px;
  font-size:13px;
  color:#aaa;
  max-height:150px;
  overflow:auto;
}
</style>
</head>

<body>

<div class="container">

<div class="title">PHỤC CHÂN LỤC - NHÂN SINH KHỊA</div>

<div class="status" id="status"></div>
<div class="story" id="story"></div>
<div class="choices" id="choices"></div>
<div class="log" id="log"></div>

</div>

<script>

/* ===== CHỈ SỐ ===== */
let state = {
  tam: "Bình tĩnh nhưng dễ cáu",
  danh: 10,
  nhan: 50,
  nghiep: 0
};

/* ===== UI ===== */
function updateStatus(){
  document.getElementById("status").innerHTML = `
  Tâm cảnh: ${state.tam}<br>
  Danh vọng: ${state.danh}<br>
  Nhân duyên: ${state.nhan}<br>
  Nghiệp lực: ${state.nghiep}
  `;
}

function log(t){
  document.getElementById("log").innerHTML += "• " + t + "<br>";
}

function showScene(text, options){
  document.getElementById("story").innerHTML = text;

  let html = "";
  options.forEach(o=>{
    html += `<button onclick="${o.action}">${o.text}</button>`;
  });

  document.getElementById("choices").innerHTML = html;
}

/* ===== START ===== */
function start(){

  updateStatus();

  showScene(`
Hôm nay tiểu muội muội đòi ngươi tìm trai đẹp có múi cho nàng sờ.

Ngươi đang đứng giữa Trường An, trời xanh mây trắng, lòng người thì... không chắc.

Tiểu muội nhìn ngươi với ánh mắt kỳ vọng:
"Huynh... tìm cho muội một người có múi được không?"

Ngươi trầm mặc 3 giây.

Trong đầu hiện lên rất nhiều câu hỏi:
👉 "Nàng bị gì vậy?"
👉 "Ta là môi giới trai đẹp à?"
👉 "Hay ta nên đánh nàng luôn cho nhanh?"

Ngươi sẽ:
  `,[
    {text:"- Kick nàng (giải quyết nhanh gọn)", action:"A()"},
    {text:"- Đẩy cho người khác (đúng chất bạn tốt)", action:"B()"},
    {text:"- Bảo nàng tự đi mà kiếm (tự lực cánh sinh)", action:"C()"},
    {text:"- Trách nàng: 'Sao không sờ đồ trong nhà mà chán cơm thèm phở?'", action:"D()"}
  ]);
}

/* ===== CHOICE ===== */
function A(){
  state.nhan -= 10;
  state.nghiep += 5;

  log("Ngươi tung một cước. Tiểu muội bay ngang qua một sạp bán bánh bao.");
  log("Chủ sạp: '??? Đây là đánh người hay biểu diễn võ thuật?'");

  updateStatus();

  next();
}

function B(){
  state.nhan += 3;
  state.danh -= 1;

  log("Ngươi tiện tay đẩy nàng sang một nam tử qua đường.");
  log("Nam tử: 'Ủa liên quan gì tới ta???'");

  updateStatus();

  next();
}

function C(){
  state.danh += 2;

  log("Ngươi bình thản: 'Tự đi mà kiếm.'");
  log("Tiểu muội: 'Huynh vô tâm thật sự.'");

  updateStatus();

  next();
}

function D(){
  state.nhan += 8;
  state.nghiep += 4;
  state.danh += 2;

  log("Không khí đóng băng 5 giây.");
  log("Một bà bán rau gần đó ho sặc: 'Nói chuyện kiểu gì vậy trời???'");

  updateStatus();

  showScene(`
Tiểu muội đỏ mặt từ cổ lên tới chân tóc.

Nàng siết chặt nắm tay.

"Huynh hôm nay... muốn chết phải không?"

⚠️ SÁT KHÍ TĂNG CAO
  `,[
    {text:"- Chuẩn bị ăn đòn", action:"fight()"},
    {text:"- Giả vờ nhìn trời như chưa từng nói gì", action:"run()"}
  ]);
}

/* ===== NEXT ===== */
function next(){
  showScene(`
Ngươi tiếp tục bước đi.

Trường An vẫn đông đúc.

Chỉ là... phía sau có người đang nhìn ngươi với ánh mắt không mấy thân thiện.
  `,[
    {text:"- Kệ luôn, đời là vậy", action:"randomEvent()"}
  ]);
}

/* ===== RANDOM EVENT ===== */
function randomEvent(){

  let r = Math.random();

  if(r < 0.5){
    state.danh += 3;
    log("Ngươi vô tình giúp một người → danh vọng tăng.");
  }else{
    state.nghiep += 3;
    log("Ngươi vô tình gây drama → nghiệp lực tăng.");
  }

  updateStatus();

  showScene(`
Một ngày trôi qua.

Ngươi tự hỏi: "Mình sống như vậy có ổn không?"
  `,[
    {text:"- Chơi lại (đời làm lại từ đầu)", action:"restart()"}
  ]);
}

/* ===== PvP ===== */
function fight(){
  state.danh += 5;
  state.nghiep += 5;

  log("Ngươi ăn trọn combo liên hoàn cước.");
  log("Kết quả: ngươi vẫn thua.");

  updateStatus();

  showScene(`
Ngươi nằm trên đất, suy nghĩ về cuộc đời.

👉 Bài học: Đừng khịa quá đà.
  `,[
    {text:"- Chơi lại", action:"restart()"}
  ]);
}

function run(){
  state.danh -= 2;

  log("Ngươi quay đầu nhìn trời: 'Hôm nay thời tiết đẹp thật.'");
  log("Sau đó lặng lẽ biến mất.");

  updateStatus();

  showScene(`
Ngươi thoát thân thành công.

Nhưng danh dự... thì không chắc.
  `,[
    {text:"- Chơi lại", action:"restart()"}
  ]);
}

/* ===== RESET ===== */
function restart(){
  state = {
    tam:"Bình tĩnh nhưng dễ cáu",
    danh:10,
    nhan:50,
    nghiep:0
  };
  document.getElementById("log").innerHTML="";
  start();
}

/* START */
start();

</script>

</body>
</html>
