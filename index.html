<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nhân Sinh Khịa Cấp Cao</title>

<style>
body{
  margin:0;
  font-family:"Times New Roman",serif;
  background:#0a0a0a;
  color:#eee;
}
.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}
.title{
  text-align:center;
  font-size:28px;
  color:#d4af37;
  margin-bottom:20px;
}
.status{
  border:1px solid #d4af37;
  padding:10px;
  background:#111;
  margin-bottom:15px;
}
.story{
  border:1px solid #444;
  padding:15px;
  background:#111;
  margin-bottom:15px;
  line-height:1.7;
}
.choices button{
  width:100%;
  margin:6px 0;
  padding:10px;
  background:#222;
  color:#fff;
  border:none;
  cursor:pointer;
}
.choices button:hover{
  background:#d4af37;
  color:#000;
}
.log{
  margin-top:15px;
  font-size:13px;
  color:#aaa;
  max-height:150px;
  overflow:auto;
}
</style>
</head>

<body>

<div class="container">

<div class="title">PHỤC CHÂN LỤC - NHÂN SINH KHỊA</div>

<div id="status" class="status"></div>
<div id="story" class="story"></div>
<div id="choices" class="choices"></div>
<div id="log" class="log"></div>

</div>

<script>

/* ===== CHỈ SỐ ===== */
let state = {
  tam: "Bình tĩnh nhưng dễ cáu",
  danh: 10,
  nhan: 50,
  nghiep: 0
};

/* ===== UI ===== */
function updateStatus(){
  document.getElementById("status").innerHTML = `
  Tâm cảnh: ${state.tam}<br>
  Danh vọng: ${state.danh}<br>
  Nhân duyên: ${state.nhan}<br>
  Nghiệp lực: ${state.nghiep}
  `;
}

function log(t){
  document.getElementById("log").innerHTML += "• " + t + "<br>";
}

function showScene(text, options){
  document.getElementById("story").innerHTML = text;

  let html = "";
  options.forEach(o=>{
    html += `<button onclick="${o.action}">${o.text}</button>`;
  });

  document.getElementById("choices").innerHTML = html;
}

/* ===== START ===== */
function start(){

  updateStatus();

  showScene(`
Hôm nay tiểu muội muội đòi ngươi tìm trai đẹp có múi cho nàng sờ.

Ngươi đứng giữa Trường An, lòng bắt đầu thấy sai sai...

"Huynh... tìm giúp muội được không?"

Ngươi suy nghĩ:

👉 Ta là môi giới hay gì?
👉 Hay nên xử lý nàng luôn?

Ngươi sẽ:
  `,[
    {text:"- Kick nàng", action:"A()"},
    {text:"- Đẩy cho người khác", action:"B()"},
    {text:"- Bảo nàng tự đi mà kiếm", action:"C()"},
    {text:"- Trách nàng sao không sờ đồ trong nhà mà chán cơm thèm phở", action:"D()"}
  ]);
}

/* ===== CHOICE ===== */
function A(){
  state.nhan -= 10;
  state.nghiep += 5;

  log("Ngươi tung một cước. Tiểu muội bay ngang qua quầy bánh.");
  updateStatus();

  next();
}

function B(){
  state.nhan += 3;
  state.danh -= 1;

  log("Ngươi đẩy nàng sang người qua đường.");
  updateStatus();

  next();
}

function C(){
  state.danh += 2;

  log("Ngươi: 'Tự đi mà kiếm.'");
  updateStatus();

  next();
}

function D(){
  state.nhan += 8;
  state.nghiep += 4;
  state.danh += 2;

  log("Ngươi nhếch mép, tung ra câu chí mạng:");
  log("👉 'À quên mất, muội you have no door.'");

  updateStatus();

  showScene(`
Không khí đóng băng.

Một người bán hàng gần đó lặng lẽ quay đầu.

Tiểu muội đứng im.

Rồi...

"Huynh..."

"Huynh hôm nay phải chết."

⚠️ SÁT KHÍ BỘC PHÁT
  `,[
    {text:"- Chuẩn bị ăn đòn", action:"fight()"},
    {text:"- Giả vờ nhìn trời", action:"run()"}
  ]);
}

/* ===== NEXT ===== */
function next(){
  showScene(`
Ngươi tiếp tục đi dạo.

Nhưng phía sau... có cảm giác không ổn lắm.
  `,[
    {text:"- Kệ luôn", action:"randomEvent()"}
  ]);
}

/* ===== RANDOM ===== */
function randomEvent(){

  if(Math.random()<0.5){
    state.danh += 3;
    log("Danh vọng tăng.");
  }else{
    state.nghiep += 3;
    log("Nghiệp lực tăng.");
  }

  updateStatus();

  showScene(`
Một ngày trôi qua...

Ngươi tự hỏi: "Mình sống vậy ổn không?"
  `,[
    {text:"- Chơi lại", action:"restart()"}
  ]);
}

/* ===== PvP ===== */
function fight(){
  state.nghiep += 5;
  state.danh += 3;

  log("Ngươi ăn combo liên hoàn.");
  updateStatus();

  showScene(`
Ngươi nằm dưới đất.

👉 Bài học: đừng khịa quá đà.
  `,[
    {text:"- Chơi lại", action:"restart()"}
  ]);
}

function run(){
  state.danh -= 2;

  log("Ngươi giả vờ ngắm trời rồi biến mất.");
  updateStatus();

  showScene(`
Ngươi thoát thân thành công.

Nhưng... danh dự thì không.
  `,[
    {text:"- Chơi lại", action:"restart()"}
  ]);
}

/* ===== RESET ===== */
function restart(){
  state = {
    tam:"Bình tĩnh nhưng dễ cáu",
    danh:10,
    nhan:50,
    nghiep:0
  };
  document.getElementById("log").innerHTML="";
  start();
}

start();

</script>

</body>
</html>
